name: Build

on:
  push:
    branches: ['**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile
        run: docker run --rm -v ${{ github.workspace }}:/build -w /build raetro/quartus:21.1 quartus_sh -t generate.tcl

      - name: Reverse bitstream
        run: python3 scripts/reverse_bitstream.py src/fpga/build/output_files/ap_core.rbf pkg/Cores/mincer_ray.GBA/bitstream.rbf_r

      - name: Upload bitstream
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: bitstream
          path: pkg/Cores/mincer_ray.GBA/bitstream.rbf_r

      - name: Extract timing closure failures
        if: always()
        run: |
          STA="src/fpga/build/output_files/ap_core.sta.summary"
          if [ -f "$STA" ]; then
            awk '
              /^Type/  { type_line = $0 }
              /^Slack/ { slack_line = $0; sub(/^Slack *: */, "", slack_line); slack = slack_line + 0 }
              /^TNS/   {
                tns_line = $0; sub(/^TNS *: */, "", tns_line); tns = tns_line + 0
                if (slack < 0) {
                  print type_line
                  print "Slack: " slack_line
                  print "TNS:   " tns_line
                  print ""
                }
                type_line = ""; slack = 0
              }
            ' "$STA" > timing.txt
          fi
          if [ ! -s timing.txt ]; then
            echo "No timing closure failures." > timing.txt
          fi

      - name: Upload timing report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: timing
          path: timing.txt

      - name: Check custom STA reports
        if: always()
        run: |
          echo "=== Custom STA reports ==="
          ls -la build_output/reports/ 2>/dev/null || echo "No custom STA reports directory found"
          echo "=== Output files ==="
          ls -la src/fpga/build/output_files/*.rpt src/fpga/build/output_files/*.summary 2>/dev/null || true

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            src/fpga/build/output_files/ap_core.fit.summary
            src/fpga/build/output_files/ap_core.fit.rpt
            src/fpga/build/output_files/ap_core.sta.summary
            src/fpga/build/output_files/ap_core.sta.rpt
            src/fpga/build/output_files/ap_core.flow.rpt
            build_output/reports/
